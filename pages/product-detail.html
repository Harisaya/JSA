<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chi Tiết Sản Phẩm - DarkHub</title>

<link rel="stylesheet" href="../styles.css">

</head>

<body>

<div class="app">

<header class="header">
<div class="header-wrapper">

<div class="logo">
<span class="logo-emoji">🛍</span>
<span class="logo-text">DarkHub</span>
</div>

<div class="header-right">
<a href="../index.html" class="nav-link">Trang Chủ</a>
<a href="search.html" class="nav-link">Tìm Kiếm</a>
<a href="cart.html" class="nav-link">Giỏ Hàng</a>
<a href="orders.html" class="nav-link">Đơn Hàng</a>
<a href="profile.html" class="nav-link">Hồ Sơ</a>
</div>

</div>
</header>

<main class="main-content">


<a href="../index.html" class="back-link custom-back-link">
		<span class="back-icon">←</span> <span>Quay lại</span>
</a>

<div id="productDetail" class="product-detail-card">
	<div class="product-detail-image-frame">
		<img id="productImage" src="" class="product-image-fixed">
	</div>
	<div class="product-detail-info-block">
		<h1 id="productName" class="product-title"></h1>
		<div class="product-rating">
			<span id="productRating"></span>
			<span id="productReviews"></span>
		</div>
		<div id="productPrice" class="product-price"></div>
		<p id="productDescription" class="product-description"></p>
		<div class="product-info">
			<div class="info-row">
				<span>🕐 Thời gian giao</span>
				<strong id="deliveryTime"></strong>
			</div>
			<div class="info-row">
				<span>🚚 Phí giao</span>
				<strong id="deliveryFee"></strong>
			</div>
			<div class="info-row">
				<span>🏪 Nhà hàng</span>
				<strong id="restaurant"></strong>
			</div>
		</div>
	</div>
</div>

</main>

</div>

<script src="../scripts/config.js"></script>

<script>

function getProductFromURL(){
const params = new URLSearchParams(window.location.search)
return params.get("id")
}

function loadProduct(){

const id = getProductFromURL()

if(!id){
document.getElementById("productDetail").innerHTML="Không tìm thấy sản phẩm"
return
}

const product = JSON.parse(sessionStorage.getItem('selectedRestaurant'))

if(!product || product.id !== id){
document.getElementById("productDetail").innerHTML="Không tìm thấy sản phẩm"
return
}

document.getElementById("productImage").src = product.image || product.logo || ''
document.getElementById("productName").innerText = product.name || product.title || 'Product'
document.getElementById("productRating").innerText = "⭐ " + (product.rating || 0)
document.getElementById("productReviews").innerText = "(" + (product.reviews || 0) + " reviews)"
document.getElementById("productPrice").innerText = "AED " + (product.price || 0)
document.getElementById("productDescription").innerText = product.description || 'No description'

document.getElementById("deliveryTime").innerText = product.deliveryTime || 'N/A'
document.getElementById("deliveryFee").innerText = product.deliveryFee || 'N/A'
document.getElementById("restaurant").innerText = product.name || product.title || 'Product'

}

loadProduct()

</script>

</body>
</html>
