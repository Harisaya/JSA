<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chi Tiết Sản Phẩm - DarkHub</title>

<link rel="stylesheet" href="../styles.css">

</head>

<body>

<div class="app">

<header class="header">
<div class="header-wrapper">

<div class="logo">
<span class="logo-emoji">🛍</span>
<span class="logo-text">DarkHub</span>
</div>

<div class="header-right">
<a href="../index.html" class="nav-link">Trang Chủ</a>
<a href="search.html" class="nav-link">Tìm Kiếm</a>
<a href="cart.html" class="nav-link">Giỏ Hàng</a>
<a href="orders.html" class="nav-link">Đơn Hàng</a>
<a href="profile.html" class="nav-link">Hồ Sơ</a>
</div>

</div>
</header>

<main class="main-content">

<a href="../index.html" class="back-link">← Quay lại</a>

<div id="productDetail" class="product-detail">

<div class="product-image-section">
<img id="productImage" src="" class="product-image">
</div>

<div class="product-info-section">

<h1 id="productName"></h1>

<div class="product-rating">
<span id="productRating"></span>
<span id="productReviews"></span>
</div>

<div id="productPrice"></div>

<p id="productDescription"></p>

<div class="product-info">

<div class="info-row">
<span>🕐 Thời gian giao</span>
<strong id="deliveryTime"></strong>
</div>

<div class="info-row">
<span>🚚 Phí giao</span>
<strong id="deliveryFee"></strong>
</div>

<div class="info-row">
<span>🏪 Nhà hàng</span>
<strong id="restaurant"></strong>
</div>

</div>

</div>

</div>

</main>

</div>

<script src="../scripts/config.js"></script>
<!-- main.js lives at the workspace root, not in /scripts -->
<script src="../main.js"></script>

<script>

function getProductFromURL(){
const params = new URLSearchParams(window.location.search)
return params.get("id")
}

function loadProduct(){

const id = getProductFromURL()

if(!id){
document.getElementById("productDetail").innerHTML="Không tìm thấy sản phẩm"
return
}

const products = window.products || []

const product = products.find(p=>p.id==id)

if(!product){
document.getElementById("productDetail").innerHTML="Không tìm thấy sản phẩm"
return
}

document.getElementById("productImage").src = product.image
document.getElementById("productName").innerText = product.name
document.getElementById("productRating").innerText = "⭐ "+product.rating
document.getElementById("productReviews").innerText = "("+product.reviews+" reviews)"
document.getElementById("productPrice").innerText = "AED "+product.price
document.getElementById("productDescription").innerText = product.description

document.getElementById("deliveryTime").innerText = product.deliveryTime
document.getElementById("deliveryFee").innerText = product.deliveryFee
document.getElementById("restaurant").innerText = product.name

}

loadProduct()

</script>

</body>
</html>
